name: Verify repository

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify prompt repository contract
        run: python3 tools/verify_repo.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
